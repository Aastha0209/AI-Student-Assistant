<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <h2>AI Assistant</h2>

      <ul>

        <li>Dashboard</li>

        <li>Attendance</li>

        <li>Notes</li>

        <li>Tasks</li>

        <li>Timetable</li>

        <li>Profile</li>

        <li>
          <button id="logout-btn">
            Logout
          </button>
        </li>

      </ul>

    </div>


    <!-- MAIN CONTENT -->
    <div class="main-content">

      <div class="topbar">

        <h1>Student Dashboard</h1>

      </div>


      <!-- CARDS -->
      <div class="cards">

        <div class="dashboard-card">

          <h3>Attendance</h3>

          <p>85%</p>

        </div>


        <div class="dashboard-card">

          <h3>Pending Tasks</h3>

          <p>4 Tasks</p>

        </div>


        <div class="dashboard-card">

          <h3>Uploaded Notes</h3>

          <p>12 Files</p>

        </div>

      </div>


      <!-- TASK MANAGER -->
      <div class="task-section">

        <h2>Task Manager</h2>

        <form id="task-form">

          <input
            type="text"
            id="task-input"
            placeholder="Enter Task"
            required
          >

          <button type="submit">
            Add Task
          </button>

        </form>

        <ul id="task-list"></ul>

      </div>

    </div>

  </div>


  <!-- TASK SCRIPT -->
  <script type="module" src="js/tasks.js"></script>

  <!-- LOGOUT SCRIPT -->
  <script type="module" src="js/logout.js"></script>

</body>
</html>
